services:
  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASS}
    volumes:
      - mongo-data:/data/db
    
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${process.env.DB_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${process.env.DB_PASS}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_URL: mongodb://${DB_USER}:${DB_PASS}@mongo:27017/

  workflow:
    image: joypatel2403/practise
    build: .
    container_name: workflow
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: ${MONGO_URI}
    depends_on:
      - mongo

volumes:
  mongo-data: