apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sandbox-workflow-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/joypatel2403/ci-cd-workflow.git'
    targetRevision: HEAD
    path: k8s # This tells Argo CD to look inside your k8s/ folder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: sandbox # The namespace where your app will run
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true